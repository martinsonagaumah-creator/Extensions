 <!DOCTYPE html>
 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="lol.css">
 </head>
 <body>
    <div data-active="true" class="extensions-grid">
        <h3>DevLens</h3>
        <p>Quickly inspect page layouts and visualize elements boundaries.</p>
        <button class="remove-btn">Remove</button>
        <label class="switch">
            <input type="checkbox">
            <span class="slider"></span>
        </label>
    </div>
    <div data-active="true" class="extensions-grid">
        <h3>StyleSpy</h3>
        <p>Instantly analyze and copy CSS from any webpage element.</p>
        <button class="remove-btn">Remove</button>
        <label class="switch">
            <input type="checkbox">
            <span class="slider"></span>
        </label>
    </div>
    <div data-active="false" class="extensions-grid" >
        <h3>SpeedBoost</h3>
        <p>Optimizes browser resource usage to accelerate page loading.</p>
        <button class= "remove-btn">Remove</button>
        <label class="switch">
            <input type="checkbox">
            <span class="slider"></span>
        </label>
    </div>
    <script src="lol.js"></script>
 </body>
 </html>
